<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Remoting</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0d1117;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex: 1;
      padding: 4px;
    }
    #error-container {
      color: #da3633;
      padding: 20px;
      font-family: system-ui, sans-serif;
      font-size: 16px;
      display: none;
    }
    .status {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-family: system-ui, sans-serif;
      z-index: 100;
    }
    .status.connected {
      background: #238636;
      color: white;
    }
    .status.disconnected {
      background: #da3633;
      color: white;
    }
    .status.connecting {
      background: #d29922;
      color: white;
    }
  </style>
</head>
<body>
  <div id="status" class="status connecting">Connecting...</div>
  <div id="error-container"></div>
  <div id="terminal"></div>

  <script>
    const statusEl = document.getElementById('status');
    const terminalEl = document.getElementById('terminal');
    const errorEl = document.getElementById('error-container');

    // Extract session ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session');

    if (!sessionId) {
      errorEl.textContent = 'Error: No session ID in URL. Use the URL shown in the terminal.';
      errorEl.style.display = 'block';
      statusEl.textContent = 'No Session';
      statusEl.className = 'status disconnected';
      throw new Error('No session ID');
    }

    // Initialize xterm.js
    const terminal = new Terminal({
      cursorBlink: true,
      fontSize: 14,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      theme: {
        background: '#0d1117',
        foreground: '#c9d1d9',
        cursor: '#c9d1d9',
        black: '#484f58',
        red: '#ff7b72',
        green: '#3fb950',
        yellow: '#d29922',
        blue: '#58a6ff',
        magenta: '#bc8cff',
        cyan: '#39c5cf',
        white: '#b1bac4',
        brightBlack: '#6e7681',
        brightRed: '#ffa198',
        brightGreen: '#56d364',
        brightYellow: '#e3b341',
        brightBlue: '#79c0ff',
        brightMagenta: '#d2a8ff',
        brightCyan: '#56d4dd',
        brightWhite: '#f0f6fc',
      },
    });

    terminal.open(terminalEl);

    // Fit addon for auto-sizing
    let fitAddon = null;
    try {
      fitAddon = new FitAddon.FitAddon();
      terminal.loadAddon(fitAddon);
      fitAddon.fit();
    } catch (_) {}

    // WebSocket connection
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${window.location.host}/ws`;
    let activeWs = null;
    let dead = false;

    function connect() {
      if (dead) return;

      const ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'auth', sessionId: sessionId }));
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'auth_ok') {
          activeWs = ws;
          statusEl.textContent = 'Connected';
          statusEl.className = 'status connected';
          terminal.focus();
          if (fitAddon) fitAddon.fit();
          // Send initial terminal size to server PTY
          if (terminal.cols && terminal.rows) {
            ws.send(JSON.stringify({ type: 'resize', cols: terminal.cols, rows: terminal.rows }));
          }
          return;
        }

        if (msg.type === 'data') {
          terminal.write(msg.data);
          return;
        }

        if (msg.type === 'history') {
          terminal.write(msg.data);
          return;
        }

        if (msg.type === 'exit') {
          terminal.write('\r\n\n[Claude Code has exited]');
          statusEl.textContent = 'Session ended';
          statusEl.className = 'status disconnected';
          dead = true;
          return;
        }
      };

      ws.onclose = (event) => {
        if (ws === activeWs) activeWs = null;
        if (event.code === 4003 || event.code === 4001) {
          statusEl.textContent = 'Session expired';
          statusEl.className = 'status disconnected';
          dead = true;
          return;
        }
        statusEl.textContent = 'Reconnecting...';
        statusEl.className = 'status connecting';
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        // onclose handles reconnection
      };
    }

    // Register input handler once, outside connect()
    terminal.onData((data) => {
      if (activeWs && activeWs.readyState === WebSocket.OPEN) {
        activeWs.send(JSON.stringify({ type: 'input', data }));
      }
    });

    connect();

    // Handle window resize → notify PTY
    window.addEventListener('resize', () => {
      if (fitAddon) fitAddon.fit();
      if (activeWs && activeWs.readyState === WebSocket.OPEN && terminal.cols && terminal.rows) {
        activeWs.send(JSON.stringify({ type: 'resize', cols: terminal.cols, rows: terminal.rows }));
      }
    });
  </script>
</body>
</html>
